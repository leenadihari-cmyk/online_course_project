<!DOCTYPE html>
<html>
<head>
    <title>{{ course.name }} - Exam</title>
</head>
<body>
    <h1>Exam for {{ course.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {% for question in questions %}
            <p><strong>{{ forloop.counter }}. {{ question.text }}</strong></p>
            {% for choice in question.choices.all %}
                <label>
                    <input type="radio" name="{{ question.id }}" value="{{ choice.id }}">
                    {{ choice.text }}
                </label><br>
            {% endfor %}
        {% endfor %}
        <br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
