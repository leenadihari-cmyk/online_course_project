<!DOCTYPE html>
<html>
<head>
    <title>Online Courses</title>
</head>
<body>
    <h1>Courses</h1>
    <ul>
        {% for course in courses %}
            <li>
                {{ course.name }} -
                <a href="{% url 'submit' course.id %}">Take Exam</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
